---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json
## Install DNF packages for all images

modules:
  - type: dnf
    repos:
      nonfree: negativo17
      cleanup: true
    install:
      allow-erasing: true
      packages:
        - alsa-firmware
        - alsa-tools
        - alsa-utils
        - alsamixergui
        - jack-mixer
        - pavucontrol
        - qjackctl
        - kernel-tools
        - realtime-setup
        - tuned-gtk
        - tuned-profiles-cpu-partitioning
        - tuned-profiles-realtime
        - htop
        - ardour9
        - mixxx
        - yoshimi
        - zita-at1
        - zita-rev1
        - fluidsynth
        - fluid-soundfont-gm
        - ffmpeg
        - cdrecord
        - mkisofs
        - cdda2wav
        - rar

  - type: dnf
    repos:
      copr:
        - ycollet/audinux
    install:
      skip-unavailable: true
      allow-erasing: true
      packages:
        - Carla-mao
        - raysession
        - millisecond
        - jack-link
        - jack_capture
        - jack_delay
        - jack_utils
        - jackctlmmc
        - jackass
        - midiwake
        - timemachine
        - yabridge
        - yabridge-tui
        - wineasio
        - zrythm
        - lmms-mao-weekly
        - BespokeSynth
        - tenacity
        - mamba
        - samplehive
        - loopino
        - lsp-plugins
        - dpf-plugins
        - DISTRHO-Ports
        - cardinal
        - surge-xt
        - amsynth
        - guitarix
        - hamburger
        - valentine
        - dragonfly-reverb
        - puredata
        - plugdata
        - orca-lang
